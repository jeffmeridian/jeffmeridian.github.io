  <script>
    // Immediately apply theme to avoid flash
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
      document.body.classList.add('dark');
    }

    // --- LANGUAGE NOTIFICATION & REDIRECT ---
    (function() {
      // 1. Determine if this is a fresh visit or an internal navigation.
      const isInternalNavigation = document.referrer.indexOf(window.location.origin) === 0;

      // 2. Only auto-redirect on the English root on a fresh visit
      if (window.location.pathname === '/' && !isInternalNavigation) {
        let savedLang = localStorage.getItem('user_language');
        
        if (!savedLang) {
          const browserLang = (navigator.language || navigator.userLanguage).toLowerCase();
          if (browserLang.startsWith('de')) {
            window.location.replace('/deutsch/');
            return;
          } else if (browserLang.startsWith('es')) {
            window.location.replace('/espanol/');
            return;
          }
        } else {
           if (savedLang === 'de') {
             window.location.replace('/deutsch/');
             return;
           } else if (savedLang === 'es') {
             window.location.replace('/espanol/');
             return;
           }
        }
      }

      // 3. Update their preferred language based on where they actually navigate
      if (window.location.pathname.startsWith('/deutsch')) {
        localStorage.setItem('user_language', 'de');
      } else if (window.location.pathname.startsWith('/espanol')) {
        localStorage.setItem('user_language', 'es');
      } else if (window.location.pathname === '/') {
        localStorage.setItem('user_language', 'en');
      }
      
      // 4. Update the home icon link dynamically based on the current saved language
      document.addEventListener('DOMContentLoaded', () => {
        const homeLink = document.querySelector('a[title="Home"]');
        if (homeLink) {
           const currentLang = localStorage.getItem('user_language');
           if (currentLang === 'de') {
             homeLink.href = '/deutsch/';
           } else if (currentLang === 'es') {
             homeLink.href = '/espanol/';
           } else {
             homeLink.href = '/';
           }
        }
      });
    })();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const hamburgerBtn = document.getElementById('hamburger-btn');
      const hamburgerDropdown = document.getElementById('hamburger-dropdown');
      const languageBtn = document.getElementById('language-btn');
      const languageDropdown = document.getElementById('language-dropdown');
      
      if (hamburgerBtn && hamburgerDropdown) {
        hamburgerBtn.addEventListener('click', (e) => {
          hamburgerDropdown.classList.toggle('active');
          if (languageDropdown) languageDropdown.classList.remove('active');
          e.stopPropagation();
        });
      }

      if (languageBtn && languageDropdown) {
        languageBtn.addEventListener('click', (e) => {
          languageDropdown.classList.toggle('active');
          if (hamburgerDropdown) hamburgerDropdown.classList.remove('active');
          e.stopPropagation();
        });
      }

      document.addEventListener('click', (e) => {
        if (hamburgerDropdown && !hamburgerDropdown.contains(e.target)) {
          hamburgerDropdown.classList.remove('active');
        }
        if (languageDropdown && !languageDropdown.contains(e.target)) {
          languageDropdown.classList.remove('active');
        }
      });
    });
  </script>

<script>
    class Player extends Phaser.Physics.Arcade.Sprite {
        constructor(scene, x, y) {
            super(scene, x, y, 'player');
            scene.add.existing(this);
            scene.physics.add.existing(this);
            this.setDisplaySize(30, 30);
            this.weapons = [
                { name: 'Pistol', fireRate: 400, damage: 1, speed: 600, color: 0xffffff, spread: 0, type: 'normal' },
                { name: 'Machine Gun', fireRate: 100, damage: 1, speed: 700, color: 0xffff00, spread: 0, type: 'rapid', recoil: 150 },
                { name: 'Grenade Launcher', fireRate: 800, damage: 3, speed: 400, color: 0x00ff00, spread: 0, type: 'grenade' },
                { name: 'Flamethrower', fireRate: 100, damage: 1, speed: 350, color: 0xff6600, spread: 200, type: 'spread' },
                { name: 'Mine', fireRate: 300, damage: 5, speed: 0, color: 0x888888, spread: 0, type: 'mine' }
            ];
            this.currentWeaponIndex = 0;
            this.weaponTimer = 0;
            this.speed = 200;
            this.facing = 'right';
            this.isDead = false;
            this.walkTimer = 0;
        }

        get currentWeapon() {
            return this.weapons[this.currentWeaponIndex];
        }

        switchWeapon() {
            let nextWeapon;
            do {
                nextWeapon = Phaser.Math.Between(0, this.weapons.length - 1);
            } while (nextWeapon === this.currentWeaponIndex && this.weapons.length > 1);
            this.currentWeaponIndex = nextWeapon;
        }

        fire(bullets) {
            if (this.weaponTimer <= 0) {
                const weapon = this.currentWeapon;

                // Enforce 1 active bomb limit
                if (weapon.type === 'grenade') {
                    let activeBombs = 0;
                    bullets.children.iterate((b) => {
                        if (b.active && b.getData('weaponType') === 'grenade') {
                            activeBombs++;
                        }
                    });
                    if (activeBombs > 0) return;
                }

                // Enforce 1 active bullet limit for Pistol
                if (weapon.name === 'Pistol') {
                    let activePistol = 0;
                    bullets.children.iterate((b) => {
                        if (b.active && b.getData('weaponName') === 'Pistol') {
                            activePistol++;
                        }
                    });
                    if (activePistol > 0) return;
                }

                this.scene.sound.play('shoot');
                const dir = this.facing === 'left' ? -1 : 1;

                if (weapon.type === 'grenade') {
                    const grenade = bullets.create(this.x, this.y, 'bullet');
                    if (grenade) {
                        grenade.setData('weaponType', 'grenade');
                        grenade.setTint(weapon.color);
                        grenade.setDisplaySize(12, 12);
                        grenade.body.setAllowGravity(true);
                        grenade.body.setGravityY(800);
                        grenade.setVelocityX(dir * weapon.speed);
                        grenade.setVelocityY(-300);
                        grenade.setBounce(0.5);
                        grenade.setDragX(200);
                        this.scene.time.delayedCall(1500, () => {
                            if (grenade.active) {
                                this.scene.explodeGrenade(grenade.x, grenade.y);
                                grenade.destroy();
                            }
                        });
                    }
                } else if (weapon.type === 'mine') {
                    const mine = bullets.create(this.x, this.y, 'bullet');
                    if (mine) {
                        mine.setData('weaponType', 'mine');
                        mine.setData('weaponName', weapon.name);
                        mine.setData('damage', weapon.damage);
                        mine.setTint(weapon.color);
                        mine.setDisplaySize(16, 8);
                        mine.body.setAllowGravity(true);
                        mine.body.setDragX(1000);
                        mine.setVelocityX(0);
                        mine.setVelocityY(0);
                    }
                } else if (weapon.type === 'spread') {
                    // Fire a burst of 4 bullets
                    for (let i = 0; i < 4; i++) {
                        const bullet = bullets.create(this.x, this.y, 'bullet');
                        if (bullet) {
                            bullet.setData('weaponType', 'normal');
                            bullet.setData('weaponName', weapon.name);
                            bullet.setData('damage', weapon.damage);
                            bullet.setTint(weapon.color);
                            const speedVariance = Phaser.Math.Between(-50, 50);
                            bullet.setVelocityX(dir * (weapon.speed + speedVariance));
                            bullet.setVelocityY(Phaser.Math.Between(-weapon.spread, weapon.spread));
                            bullet.body.setAllowGravity(false);

                            // Flames burn out quickly
                            this.scene.time.delayedCall(300, () => {
                                if (bullet.active) bullet.destroy();
                            });
                        }
                    }
                } else {
                    const bullet = bullets.create(this.x, this.y, 'bullet');
                    if (bullet) {
                        bullet.setData('weaponType', 'normal');
                        bullet.setData('weaponName', weapon.name);
                        bullet.setData('damage', weapon.damage);
                        bullet.setTint(weapon.color);
                        bullet.setVelocityX(dir * weapon.speed);
                        bullet.setVelocityY(0);
                        bullet.body.setAllowGravity(false);
                    }
                }

                if (weapon.type === 'rapid') {
                    this.body.velocity.x += (this.facing === 'left' ? weapon.recoil : -weapon.recoil);
                }

                this.weaponTimer = weapon.fireRate;
            }
        }

        die() {
            if (this.isDead) return;
            this.isDead = true;
            this.setTint(0xff0000);
            this.scene.sound.play('explosion');
            this.setVelocityY(-400);
            this.setAngularVelocity(500);
            this.body.setCollideWorldBounds(false);
            this.body.checkCollision.none = true;

            this.scene.time.delayedCall(1500, () => {
                this.scene.gameOver();
            });
        }

        update(time, delta, cursors, wasd) {
            if (this.isDead) return;
            const onGround = this.body.touching.down || this.body.blocked.down;

            const leftDown = cursors.left.isDown || wasd.A.isDown;
            const rightDown = cursors.right.isDown || wasd.D.isDown;
            const upDown = cursors.up.isDown || wasd.W.isDown || wasd.S.isDown;

            if (leftDown) {
                if (onGround) {
                    this.facing = 'left';
                    this.flipX = true;
                }
                this.body.velocity.x = -200;
            } else if (rightDown) {
                if (onGround) {
                    this.facing = 'right';
                    this.flipX = false;
                }
                this.body.velocity.x = 200;
            } else {
                if (onGround) {
                    this.body.velocity.x *= 0.8;
                    if (Math.abs(this.body.velocity.x) < 10) this.body.velocity.x = 0;
                }
            }

            // Prevent leaving the screen
            if (this.x < 15) {
                this.x = 15;
                if (this.body.velocity.x < 0) this.body.velocity.x = 0;
            } else if (this.x > 785) {
                this.x = 785;
                if (this.body.velocity.x > 0) this.body.velocity.x = 0;
            }

            if (upDown && onGround) {
                this.body.velocity.y = -400;
                this.scene.sound.play('jump');
            }

            // Animate walking
            if (Math.abs(this.body.velocity.x) > 10) {
                this.walkTimer += delta;
                this.setAngle(Math.sin(this.walkTimer * 0.01) * 10);
            } else {
                this.setAngle(0);
            }

            if (this.weaponTimer > 0) {
                this.weaponTimer -= delta;
            }
        }
    }

    class Bullet extends Phaser.Physics.Arcade.Sprite {
        constructor(scene, x, y) {
            super(scene, x, y, 'bullet');
            this.damage = 1;
        }

        update() {
            if (this.x < -50 || this.x > 850 || this.y > 650) {
                this.destroy();
            }
        }
    }

    class Enemy extends Phaser.Physics.Arcade.Sprite {
        constructor(scene, x, y, texture) {
            super(scene, x, y, texture);
            this.type = 'normal';
            this.hp = 1;
            this.speed = 50;
            this.damage = 1;
            this.isChasing = false;
            this.hasRolledChase = false;
            this.setDisplaySize(30, 30);
            this.setTint(0x00ff00);
            this.walkTimer = 0;
        }

        update(player, delta) {
            if (!this.active) {
                if (this.y > 650) {
                    this.destroy();
                }
                return;
            }

            if (player && this.body) {
                const getLevel = (y) => {
                    if (y >= 500) return 1;
                    if (y >= 400) return 2;
                    if (y >= 280) return 3;
                    if (y >= 150) return 4;
                    return 5;
                };

                const myLevel = getLevel(this.y);
                const playerLevel = getLevel(player.y);

                if (this.currentLevel !== myLevel) {
                    this.currentLevel = myLevel;
                    this.isChasing = false;
                    this.hasRolledChase = false;
                }

                if (!this.hasRolledChase && myLevel === playerLevel) {
                    this.hasRolledChase = true;
                    if (Math.random() < 0.2) { // 20% chance to become a hunter on this platform
                        this.isChasing = true;
                    }
                }

                if (this.isChasing) {
                    this.body.velocity.x = (this.x < player.x ? 1 : -1) * this.speed;
                } else if (this.body.velocity.x === 0 || Math.random() < 0.05) {
                    // Normal pathing towards gaps
                    if (this.y >= 500) { // Floor
                        this.body.velocity.x = (this.x < 400 ? 1 : -1) * this.speed;
                    } else if (this.y >= 400) { // Lower
                        this.body.velocity.x = (this.x < 400 ? 1 : -1) * this.speed;
                    } else if (this.y >= 280) { // Middle
                        this.body.velocity.x = (this.x < 400 ? -1 : 1) * this.speed;
                    } else if (this.y >= 150) { // Upper
                        this.body.velocity.x = (this.x < 400 ? 1 : -1) * this.speed;
                    } else { // Top
                        this.body.velocity.x = (this.x < 400 ? -1 : 1) * this.speed;
                    }

                    // Fail-safe
                    if (this.body.velocity.x === 0) {
                        this.body.velocity.x = (Math.random() < 0.5 ? -1 : 1) * this.speed;
                    }
                }

                // Face movement direction and animate walking
                if (this.body.velocity.x !== 0) {
                    this.setFlipX(this.body.velocity.x > 0);
                    this.walkTimer += delta;
                    this.setAngle(Math.sin(this.walkTimer * 0.01) * 10);
                } else {
                    this.setAngle(0);
                }

                if (this.y > 650) {
                    this.y = 85;
                    this.x = 400;
                    this.body.velocity.y = 0;

                    if (this.type === 'normal') {
                        this.type = 'fast';
                        this.speed = 100;
                        this.setTint(0xff0000);
                    } else if (this.type === 'fast') {
                        this.type = 'superfast';
                        this.speed = 200;
                        this.setTint(0x0000ff);
                    }
                }

                // Horizontal screen wrap
                if (this.x < -15) {
                    this.x = 815;
                } else if (this.x > 815) {
                    this.x = -15;
                }
            }
        }

        takeDamage(amount) {
            if (!this.active) return false;

            this.hp -= amount;
            this.setTint(0xffffff);
            this.scene.time.delayedCall(100, () => {
                if (this.active) {
                    if (this.type === 'normal') this.setTint(0x00ff00);
                    else if (this.type === 'fast') this.setTint(0xff0000);
                    else if (this.type === 'superfast') this.setTint(0x0000ff);
                }
            });

            if (this.hp <= 0) {
                this.destroy();
                return true;
            }
            return false;
        }
    }

    class Crate extends Phaser.Physics.Arcade.Sprite {
        constructor(scene, x, y) {
            super(scene, x, y, 'crate');
            this.setTint(0x0088ff);
            this.setDisplaySize(32, 32);
        }
    }

    class MainScene extends Phaser.Scene {
        constructor() {
            super('MainScene');
            this.score = 0;
            this.kills = 0;
            this.cratesCollected = 0;
            this.enemySpawnRate = 2500;
            this.enemySpawnTimer = 0;
            this.maxEnemies = 25;
        }

        preload() {
            this.load.image('player', 'assets/player.png');
            this.load.image('enemy', 'assets/enemy.png');
            this.load.image('fastEnemy', 'assets/enemy.png'); // use same texture, we will tint it
            this.load.image('crate', 'assets/crate.png');
            this.load.image('background', 'assets/background.png');

            // Sounds
            this.load.audio('shoot', 'assets/shoot.wav');
            this.load.audio('jump', 'assets/jump.wav');
            this.load.audio('pickup', 'assets/pickup.wav');
            this.load.audio('explosion', 'assets/explosion.wav');

            // Bullet texture
            const graphics = this.make.graphics({ x: 0, y: 0, add: false });
            graphics.fillStyle(0xffff00);
            graphics.fillRect(0, 0, 6, 6);
            graphics.generateTexture('bullet', 6, 6);
        }

        create() {
            // Background
            const bg = this.add.tileSprite(400, 300, 800, 600, 'background').setAlpha(1);
            bg.tileScaleX = 0.25;
            bg.tileScaleY = 0.25;

            // Platforms
            this.platforms = this.physics.add.staticGroup();

            const createPlat = (x, y, w, h) => {
                const rect = this.add.rectangle(x, y, w, h, 0x333333);
                rect.setStrokeStyle(1, 0x00ccff);
                this.physics.add.existing(rect, true);
                rect.body.setSize(w, 20);
                rect.body.setOffset(0, 0);
                this.platforms.add(rect);
            };

            // Floor with middle hole
            createPlat(150, 580, 300, 4);
            createPlat(650, 580, 300, 4);

            // Lower platforms
            createPlat(100, 450, 200, 4);
            createPlat(700, 450, 200, 4);

            // Middle platform
            createPlat(400, 350, 300, 4);

            // Upper platforms
            createPlat(150, 220, 300, 4);
            createPlat(650, 220, 300, 4);

            // Top spawn platform
            createPlat(400, 100, 150, 4);

            // Player
            this.player = new Player(this, 400, 400);
            this.player.setBounce(0);

            // Bullets
            this.bullets = this.physics.add.group({
                classType: Bullet,
                maxSize: 100,
                runChildUpdate: true
            });

            // Enemies
            this.enemies = this.physics.add.group({
                classType: Enemy,
                runChildUpdate: true
            });

            // Crates (weapon spawn points)
            this.crates = this.physics.add.group();
            this.spawnCrate();

            // Collisions
            this.physics.add.collider(this.player, this.platforms);
            this.physics.add.collider(this.enemies, this.platforms);
            this.physics.add.collider(this.crates, this.platforms);
            this.physics.add.collider(this.bullets, this.platforms, null, (bullet, platform) => {
                return bullet.getData('weaponType') === 'grenade' || bullet.getData('weaponType') === 'mine';
            });

            // Player picks up crates
            this.physics.add.overlap(this.player, this.crates, (player, crate) => {
                crate.destroy();
                player.switchWeapon();
                this.sound.play('pickup');
                this.score += 150;
                this.cratesCollected++;
                this.updateScoreDisplay();
                this.spawnCrate(); // Spawn next crate!
            });

            this.physics.add.overlap(this.bullets, this.enemies, (bullet, enemy) => {
                if (bullet && enemy && enemy.active && bullet.active) {
                    if (bullet.getData('weaponType') === 'grenade') {
                        this.explodeGrenade(bullet.x, bullet.y);
                        bullet.destroy();
                    } else if (bullet.getData('weaponType') === 'mine') {
                        this.sound.play('explosion');
                        this.createExplosion(enemy.x, enemy.y);
                        bullet.destroy();
                        const killed = enemy.takeDamage(999);
                        if (killed) {
                            this.score += 15;
                            this.kills++;
                            this.updateScoreDisplay();
                        }
                    } else {
                        const damage = bullet.getData('damage');
                        bullet.destroy();
                        const killed = enemy.takeDamage(damage);
                        if (killed) {
                            this.score += 15;
                            this.kills++;
                            this.sound.play('explosion');
                            this.createExplosion(enemy.x, enemy.y);
                            this.updateScoreDisplay();
                        }
                    }
                }
            });

            // Enemy vs Player
            this.physics.add.overlap(this.player, this.enemies, (player, enemy) => {
                if (player && enemy && enemy.active && !player.isDead) {
                    player.die();
                }
            });

            // Keyboard input
            this.cursors = this.input.keyboard.createCursorKeys();
            this.wasd = this.input.keyboard.addKeys('W,A,S,D');
            this.shootKeyZ = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z);
            this.shootKeyY = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Y);

            // Update loop for shooting
            this.time.addEvent({
                delay: 20,
                callback: () => {
                    if (this.shootKeyZ.isDown || this.shootKeyY.isDown) {
                        this.player.fire(this.bullets);
                    }
                },
                loop: true
            });

            // Update score display
            this.scoreText = this.add.text(400, 30, 'POINTS: 0   KILLS: 0   CRATES: 0', {
                fontSize: '28px',
                fill: '#44efff',
                fontFamily: 'Courier New',
                fontWeight: 'bold',
                stroke: '#000000',
                strokeThickness: 4,
                shadow: { color: '#d45c00', fill: true, offsetX: 3, offsetY: 3, blur: 0 }
            }).setOrigin(0.5);

            this.updateScoreDisplay();
        }

        update(time, delta) {
            if (!this.gameActive) return;

            // Player update
            this.player.update(time, delta, this.cursors, this.wasd);

            // Death by falling
            if (this.player.y > 650) {
                this.gameOver();
            }

            // Enemy spawn logic
            this.enemySpawnTimer -= delta;
            if (this.enemySpawnTimer <= 0) {
                this.spawnEnemy();
                this.enemySpawnTimer = this.enemySpawnRate;
                // Decrease spawn rate over time to increase difficulty
                // Cap the maximum frequency at 800ms (1.25 enemies per sec)
                this.enemySpawnRate = Math.max(800, this.enemySpawnRate - 50);
            }

            // Update enemies
            this.enemies.children.iterate((enemy) => {
                if (enemy && enemy.active) {
                    enemy.update(this.player, delta);
                }
            });

            // Update bullets
            this.bullets.children.iterate((bullet) => {
                if (bullet && bullet.active) {
                    bullet.update();
                }
            });
        }

        spawnEnemy() {
            if (this.enemies.countActive(true) >= this.maxEnemies) return;

            const x = 400; // spawn at top center
            const y = 85;
            const enemy = this.enemies.create(x, y, 'enemy');
            enemy.type = 'normal';
            enemy.speed = 50;
            enemy.hp = 1;
            enemy.setTint(0x00ff00);
            enemy.body.velocity.x = (Math.random() < 0.5 ? -1 : 1) * enemy.speed;
        }

        spawnCrate() {
            this.crates.clear(true, true); // ensure only 1 exists

            let minX, maxX;
            if (this.player && this.player.x < 400) {
                minX = 450;
                maxX = 750;
            } else {
                minX = 50;
                maxX = 350;
            }

            const x = minX + Math.random() * (maxX - minX);
            const crate = this.crates.create(x, 50, 'crate').setDisplaySize(32, 32).setBounce(0.2).setDragX(100);
        }

        createExplosion(x, y) {
            const particles = this.add.particles(x, y, 'bullet', {
                speed: { min: 50, max: 150 },
                angle: { min: 0, max: 360 },
                scale: { start: 0.5, end: 0 },
                lifespan: 500,
                blendMode: 'ADD',
                emitting: true,
                quantity: 10
            });
            this.time.delayedCall(500, () => particles.destroy());
        }

        explodeGrenade(x, y) {
            this.sound.play('explosion');
            this.createExplosion(x, y);
            const particles = this.add.particles(x, y, 'bullet', {
                speed: { min: 100, max: 300 },
                scale: { start: 1, end: 0 },
                blendMode: 'ADD',
                lifespan: 500,
                quantity: 30
            });
            this.time.delayedCall(500, () => particles.destroy());

            const radius = 100;
            this.enemies.children.iterate((enemy) => {
                if (enemy && enemy.active) {
                    const dist = Phaser.Math.Distance.Between(x, y, enemy.x, enemy.y);
                    if (dist <= radius) {
                        const killed = enemy.takeDamage(3);
                        if (killed) {
                            this.score += 15;
                            this.kills++;
                            this.createExplosion(enemy.x, enemy.y);
                        }
                    }
                }
            });
            this.updateScoreDisplay();
        }

        spawnPlayerRandomly() {
            const spawnPoints = [
                { x: 150, y: 550 },
                { x: 650, y: 550 }
            ];
            const pt = Phaser.Math.RND.pick(spawnPoints);
            this.player.x = pt.x;
            this.player.y = pt.y;
            this.player.body.velocity.x = 0;
            this.player.body.velocity.y = 0;
        }

        getHighScores() {
            const scores = localStorage.getItem('supabox_highscores');
            return scores ? JSON.parse(scores) : [];
        }

        saveHighScore(name, score) {
            let scores = this.getHighScores();
            scores.push({ name, score });
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 10);
            localStorage.setItem('supabox_highscores', JSON.stringify(scores));
        }

        updateHighScoreDisplay() {
            const list = document.getElementById('high-score-list');
            const scores = this.getHighScores();
            list.innerHTML = scores.map((s, i) => `
                <div class="hs-row">
                    <span class="hs-rank">${i + 1}.</span>
                    <span class="hs-name">${s.name}</span>
                    <span class="hs-score">${s.score}</span>
                </div>
            `).join('') || '<p style="text-align:center">No scores yet!</p>';
        }

        updateScoreDisplay() {
            this.scoreText.setText(`POINTS: ${this.score}   KILLS: ${this.kills}   CRATES: ${this.cratesCollected}`);
        }

        gameOver() {
            if (this.isGameOver) return;
            this.isGameOver = true;
            this.gameActive = false;

            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('ui-layer').classList.add('hidden');

            // Animate numbers
            this.animateGameOverScores(this.score, this.cratesCollected, this.kills);

            const scores = this.getHighScores();
            // Check if current score qualifies for top 10 and is greater than zero
            const minScore = scores.length >= 10 ? scores[scores.length - 1].score : -1;
            const isHighScore = this.score > 0 && this.score > minScore;

            if (isHighScore) {
                document.getElementById('name-input-container').classList.remove('hidden');
                document.getElementById('player-name').value = '';
                setTimeout(() => document.getElementById('player-name').focus(), 100);
            } else {
                document.getElementById('name-input-container').classList.add('hidden');
            }

            this.updateHighScoreDisplay();
        }

        animateGameOverScores(targetScore, targetCrates, targetKills) {
            const scoreElem = document.getElementById('final-score');
            const cratesElem = document.getElementById('final-crates');
            const killsElem = document.getElementById('final-kills');

            let displayScore = 0;
            let displayCrates = 0;
            let displayKills = 0;

            const duration = 1500; // 1.5 seconds
            const start = Date.now();

            let lastBeepScore = 0;

            const timer = setInterval(() => {
                const elapsed = Date.now() - start;
                const progress = Math.min(elapsed / duration, 1);

                // Ease out quadratic
                const ease = 1 - (1 - progress) * (1 - progress);

                displayScore = Math.floor(ease * targetScore);
                displayCrates = Math.floor(ease * targetCrates);
                displayKills = Math.floor(ease * targetKills);

                scoreElem.textContent = displayScore;
                cratesElem.textContent = displayCrates;
                killsElem.textContent = displayKills;

                // Play beep for every 10 points
                if (Math.floor(displayScore / 10) > Math.floor(lastBeepScore / 10)) {
                    this.sound.play('pickup', { volume: 0.1, detune: 800 });
                    lastBeepScore = displayScore;
                }

                if (progress === 1) {
                    clearInterval(timer);
                }
            }, 16);
        }

        restart() {
            this.score = 0;
            this.kills = 0;
            this.cratesCollected = 0;
            this.enemySpawnRate = 2500;
            this.enemySpawnTimer = 0;
            this.gameActive = true;

            // Clear enemies and bullets
            this.enemies.clear(true, true);
            this.bullets.clear(true, true);

            // Reset player state
            this.player.isDead = false;
            this.player.setTint(0xffffff);
            this.player.setRotation(0);
            this.player.setAngularVelocity(0);
            this.player.body.checkCollision.none = false;
            this.player.currentWeaponIndex = 0;
            this.spawnPlayerRandomly();

            this.updateScoreDisplay();
            this.isGameOver = false;

            // Hide all UI overlays
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('name-input-container').classList.add('hidden');
        }
    }

    // Game configuration
    const config = {
        type: Phaser.AUTO,
        parent: 'game-container',
        width: 800,
        height: 600,
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 500 },
                debug: false
            }
        },
        scene: [MainScene]
    };

    // Create the game
    const game = new Phaser.Game(config);

    // Helper to unlock audio context on DOM interaction
    const unlockAudio = () => {
        if (game.sound && game.sound.context && game.sound.context.state === 'suspended') {
            game.sound.context.resume();
        }
    };

    // Start button
    document.getElementById('start-btn').addEventListener('click', () => {
        unlockAudio();
        const scene = game.scene.scenes[0];
        if (scene) scene.restart();
    });

    // Restart button
    document.getElementById('restart-btn').addEventListener('click', () => {
        unlockAudio();
        const scene = game.scene.scenes[0];
        if (scene) scene.restart();
    });

    // Submit score button
    document.getElementById('submit-score-btn').addEventListener('click', () => {
        const nameInput = document.getElementById('player-name');
        const name = nameInput.value.trim() || 'ANONYMOUS';
        const scene = game.scene.scenes[0];
        if (scene) {
            scene.saveHighScore(name.toUpperCase(), scene.score);
            scene.updateHighScoreDisplay();
            document.getElementById('name-input-container').classList.add('hidden');
            nameInput.value = '';
            // Refocus on game
            game.input.keyboard.enabled = true;
        }
    });

    // Prevent Phaser from capturing keyboard while typing name
    const playerInput = document.getElementById('player-name');
    if (playerInput) {
        playerInput.addEventListener('focus', () => {
            game.input.keyboard.enabled = false;
        });
        playerInput.addEventListener('blur', () => {
            game.input.keyboard.enabled = true;
        });
        playerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('submit-score-btn').click();
            }
            e.stopPropagation();
        });
    }

    // Handle Enter key for starting / restarting
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            unlockAudio();
            const startScreen = document.getElementById('start-screen');
            const gameOverScreen = document.getElementById('game-over');

            if (startScreen && !startScreen.classList.contains('hidden')) {
                document.getElementById('start-btn').click();
            } else if (gameOverScreen && !gameOverScreen.classList.contains('hidden')) {
                document.getElementById('restart-btn').click();
            }
        }
    });

</script>
