        /* Language Switcher Logic */
        [data-lang="en"] .lang-de,

        .lang-toggle {
            position: absolute;
            top: 20px;

            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .lang-btn {
            background: #1A1A1A;
            color: #E6D2B1;
            border: var(--border-style);
            padding: 5px 10px;
            cursor: pointer;
            font-family: "Courier New", Courier, monospace;
            transition: all 0.2s;
            box-shadow: 3px 3px 0px #E74C3C;
        }

        .lang-btn.active {
            background: #E74C3C;
            color: #1A1A1A;
            box-shadow: 3px 3px 0px #1A1A1A;
            font-weight: bold;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Courier New", Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .masthead {
            font-family: "Impact", "Arial Black", sans-serif;
            font-size: 6rem;
            text-transform: uppercase;
            letter-spacing: -3px;
            -webkit-text-stroke: 3px #1A1A1A;
            color: #FFFFFF;
            text-align: center;
            margin: 3rem 0 1rem;
            line-height: 1;
            text-shadow: 6px 6px 0px #1A1A1A;
        }

        .masthead-subtitle {
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            border-top: var(--border-style);
            border-bottom: var(--border-style);
            padding: 5px 10px;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
        }

        .gallery-container {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .page-wrapper {
            width: 100%;
            margin-bottom: 40px;
            background: #1A1A1A;
            box-shadow: var(--hard-shadow);
            border: var(--border-style);
            display: flex;
        }

        .page-img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media screen and (max-width: 768px) {
            .masthead {
                font-size: 4rem;
                margin-top: 5rem;
            }

            .page-wrapper {
                margin-bottom: 20px;
                box-shadow: 3px 3px 0px #1A1A1A;
            }

            .gallery-container {
                padding: 0 10px;
            }
        }

    <script>
        function setLang(lang) {
            document.documentElement.setAttribute('data-lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === lang) {
                    btn.classList.add('active');
                }
            });

            // Update URL without reloading
            const url = new URL(window.location);
            url.searchParams.set('lang', lang);
            window.history.pushState({}, '', url);
        }

        // On load, check URL parameter
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const langParam = params.get('lang');
            if (langParam && ['en', 'de', 'es'].includes(langParam)) {
                setLang(langParam);
            }
        });
    </script>
