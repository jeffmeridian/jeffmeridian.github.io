  <script>
    // Immediately apply theme to avoid flash
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
      document.body.classList.add('dark');
    }

    // --- LANGUAGE NOTIFICATION & REDIRECT ---
    (function() {
      // 1. Determine if this is a fresh visit or an internal navigation.
      const isInternalNavigation = document.referrer.indexOf(window.location.origin) === 0;

      // 2. Only auto-redirect on the English root on a fresh visit
      if (window.location.pathname === '/' && !isInternalNavigation) {
        let savedLang = localStorage.getItem('user_language');
        
        if (!savedLang) {
          const browserLang = (navigator.language || navigator.userLanguage).toLowerCase();
          if (browserLang.startsWith('de')) {
            window.location.replace('/deutsch/');
            return;
          } else if (browserLang.startsWith('es')) {
            window.location.replace('/espanol/');
            return;
          }
        } else {
           if (savedLang === 'de') {
             window.location.replace('/deutsch/');
             return;
           } else if (savedLang === 'es') {
             window.location.replace('/espanol/');
             return;
           }
        }
      }

      // 3. Update their preferred language based on where they actually navigate
      if (window.location.pathname.startsWith('/deutsch')) {
        localStorage.setItem('user_language', 'de');
      } else if (window.location.pathname.startsWith('/espanol')) {
        localStorage.setItem('user_language', 'es');
      } else if (window.location.pathname === '/') {
        localStorage.setItem('user_language', 'en');
      }
      
      // 4. Update the home icon link dynamically based on the current saved language
      document.addEventListener('DOMContentLoaded', () => {
        const homeLink = document.querySelector('a[title="Home"]');
        if (homeLink) {
           const currentLang = localStorage.getItem('user_language');
           if (currentLang === 'de') {
             homeLink.href = '/deutsch/';
           } else if (currentLang === 'es') {
             homeLink.href = '/espanol/';
           } else {
             homeLink.href = '/';
           }
        }
      });
    })();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const hamburgerBtn = document.getElementById('hamburger-btn');
      const hamburgerDropdown = document.getElementById('hamburger-dropdown');
      const languageBtn = document.getElementById('language-btn');
      const languageDropdown = document.getElementById('language-dropdown');
      
      if (hamburgerBtn && hamburgerDropdown) {
        hamburgerBtn.addEventListener('click', (e) => {
          hamburgerDropdown.classList.toggle('active');
          if (languageDropdown) languageDropdown.classList.remove('active');
          e.stopPropagation();
        });
      }

      if (languageBtn && languageDropdown) {
        languageBtn.addEventListener('click', (e) => {
          languageDropdown.classList.toggle('active');
          if (hamburgerDropdown) hamburgerDropdown.classList.remove('active');
          e.stopPropagation();
        });
      }

      document.addEventListener('click', (e) => {
        if (hamburgerDropdown && !hamburgerDropdown.contains(e.target)) {
          hamburgerDropdown.classList.remove('active');
        }
        if (languageDropdown && !languageDropdown.contains(e.target)) {
          languageDropdown.classList.remove('active');
        }
      });
    });
  </script>

    <script>
        function setLang(lang) {
            document.documentElement.setAttribute('data-lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === lang) {
                    btn.classList.add('active');
                }
            });

            // Update URL without reloading
            const url = new URL(window.location);
            url.searchParams.set('lang', lang);
            window.history.pushState({}, '', url);
        }

        // On load, check URL parameter
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const langParam = params.get('lang');
            if (langParam && ['en', 'de', 'es'].includes(langParam)) {
                setLang(langParam);
            }
        });
    </script>
