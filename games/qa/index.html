  <script>
    // Immediately apply theme to avoid flash
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
      document.body.classList.add('dark');
    }

    // --- LANGUAGE NOTIFICATION & REDIRECT ---
    (function() {
      // 1. Determine if this is a fresh visit or an internal navigation.
      const isInternalNavigation = document.referrer.indexOf(window.location.origin) === 0;

      // 2. Only auto-redirect on the English root on a fresh visit
      if (window.location.pathname === '/' && !isInternalNavigation) {
        let savedLang = localStorage.getItem('user_language');
        
        if (!savedLang) {
          const browserLang = (navigator.language || navigator.userLanguage).toLowerCase();
          if (browserLang.startsWith('de')) {
            window.location.replace('/deutsch/');
            return;
          } else if (browserLang.startsWith('es')) {
            window.location.replace('/espanol/');
            return;
          }
        } else {
           if (savedLang === 'de') {
             window.location.replace('/deutsch/');
             return;
           } else if (savedLang === 'es') {
             window.location.replace('/espanol/');
             return;
           }
        }
      }

      // 3. Update their preferred language based on where they actually navigate
      if (window.location.pathname.startsWith('/deutsch')) {
        localStorage.setItem('user_language', 'de');
      } else if (window.location.pathname.startsWith('/espanol')) {
        localStorage.setItem('user_language', 'es');
      } else if (window.location.pathname === '/') {
        localStorage.setItem('user_language', 'en');
      }
      
      // 4. Update the home icon link dynamically based on the current saved language
      document.addEventListener('DOMContentLoaded', () => {
        const homeLink = document.querySelector('a[title="Home"]');
        if (homeLink) {
           const currentLang = localStorage.getItem('user_language');
           if (currentLang === 'de') {
             homeLink.href = '/deutsch/';
           } else if (currentLang === 'es') {
             homeLink.href = '/espanol/';
           } else {
             homeLink.href = '/';
           }
        }
      });
    })();
  </script>

        </div>

      <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; display: block;">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const hamburgerBtn = document.getElementById('hamburger-btn');
      const hamburgerDropdown = document.getElementById('hamburger-dropdown');
      const languageBtn = document.getElementById('language-btn');
      const languageDropdown = document.getElementById('language-dropdown');
      
      if (hamburgerBtn && hamburgerDropdown) {
        hamburgerBtn.addEventListener('click', (e) => {
          hamburgerDropdown.classList.toggle('active');
          if (languageDropdown) languageDropdown.classList.remove('active');
          e.stopPropagation();
        });
      }

      if (languageBtn && languageDropdown) {
        languageBtn.addEventListener('click', (e) => {
          languageDropdown.classList.toggle('active');
          if (hamburgerDropdown) hamburgerDropdown.classList.remove('active');
          e.stopPropagation();
        });
      }

      document.addEventListener('click', (e) => {
        if (hamburgerDropdown && !hamburgerDropdown.contains(e.target)) {
          hamburgerDropdown.classList.remove('active');
        }
        if (languageDropdown && !languageDropdown.contains(e.target)) {
          languageDropdown.classList.remove('active');
        }
      });
    });
  </script>

<script>
  let questions = [];
  let current = 0;
  let currentLanguage = 'en';
  let testStarted = false;
  let questionsLoaded = false;

  const uiTranslations = {
    en: {
      title: "QA Test",
      welcomeTitle: "Welcome to the quality assurance test!",
      welcomeText: "Test your knowledge of software quality assurance with our curated set of 180 questions. Switch languages at any time using the selector above.",
      startBtn: "Start Test",
      loading: "Loading questions...",
      revealBtn: "Reveal Answer",
      nextBtn: "Next Question",
      completed: "🎉 You have reviewed all questions!",
      langLabel: "Language / Sprache:"
    },
    de: {
      title: "QA-Test",
      welcomeTitle: "Willkommen zum QA-Test!",
      welcomeText: "Testen Sie Ihre Kenntnisse der Software-Qualitätssicherung mit unseren 180 ausgewählten Fragen. Sie können die Sprache jederzeit über das obige Auswahlfeld ändern.",
      startBtn: "Test starten",
      loading: "Fragen werden geladen...",
      revealBtn: "Antwort anzeigen",
      nextBtn: "Nächste Frage",
      completed: "🎉 Sie haben alle Fragen durchgearbeitet!",
      langLabel: "Sprache / Language:"
    },
    es: {
      title: "Prueba de QA",
      welcomeTitle: "¡Bienvenido a la Prueba de QA!",
      welcomeText: "Pon a prueba tus conocimientos sobre aseguramiento de la calidad del software con nuestro conjunto curado de 180 preguntas. Puedes cambiar el idioma en cualquier momento usando el selector de arriba.",
      startBtn: "Iniciar Prueba",
      loading: "Cargando preguntas...",
      revealBtn: "Revelar Respuesta",
      nextBtn: "Siguiente Pregunta",
      completed: "🎉 ¡Has revisado todas las preguntas!",
      langLabel: "Idioma / Language:"
    }
  };

  function updateUIStrings() {
    const strings = uiTranslations[currentLanguage];
    document.getElementById('titleEl').textContent = strings.title;
    document.getElementById('langLabel').textContent = strings.langLabel;

    // Welcome Screen strings
    document.getElementById('welcomeTitle').textContent = strings.welcomeTitle;
    document.getElementById('welcomeText').textContent = strings.welcomeText;
    document.getElementById('startBtn').textContent = strings.startBtn;

    // Game Screen strings
    document.getElementById('revealBtn').textContent = strings.revealBtn;
    document.getElementById('nextBtn').textContent = strings.nextBtn;

    const qEl = document.getElementById('question');
    if (qEl.textContent.startsWith('Loading questions...') || qEl.textContent.startsWith('Fragen werden geladen...')) {
      qEl.textContent = strings.loading;
    } else if (qEl.textContent.startsWith('🎉') || qEl.textContent.includes('reviewed all') || qEl.textContent.includes('durchgearbeitet')) {
      qEl.textContent = strings.completed;
    }
  }

  function shuffleArray(array) {
    console.log('Shuffling questions list...');
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  function speakText(text) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel(); // Stop any currently speaking voice
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = currentLanguage === 'de' ? 'de-DE' : (currentLanguage === 'es' ? 'es-ES' : 'en-US');
      window.speechSynthesis.speak(utterance);
    } else {
      console.warn('Speech synthesis not supported in this browser.');
    }
  }

  async function loadQuestions() {
    console.log(`Starting loadQuestions() for language: ${currentLanguage}...`);
    questionsLoaded = false;
    let files = [];
    try {
      console.log('Fetching directory listing from "questions/"...');
      const response = await fetch('questions/');
      console.log('Directory listing response status:', response.status);
      if (response.ok) {
        const htmlText = await response.text();
        console.log('Fetched directory listing HTML length:', htmlText.length);
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');
        const links = Array.from(doc.querySelectorAll('a'));
        console.log('All links found in directory listing:', links.map(a => a.getAttribute('href')));

        files = links
          .map(a => a.getAttribute('href'))
          .filter(href => href && href.endsWith('.md'))
          .map(href => {
            const decodedHref = decodeURIComponent(href);
            const filename = decodedHref.split('/').pop();
            return 'questions/' + filename;
          });
        files = [...new Set(files)];
        console.log('All markdown question files:', files);

        // Filter by language
        const isGerman = currentLanguage === 'de';
        const isSpanish = currentLanguage === 'es';
        files = files.filter(path => {
          const lower = path.toLowerCase();
          if (isGerman) {
            return lower.includes('german');
          } else if (isSpanish) {
            return lower.includes('spanish');
          } else {
            // Only load the combined file for English to avoid duplicates from individual source files
            return lower.endsWith('qa questions.md');
          }
        });
        console.log(`Discovered question files for language "${currentLanguage}":`, files);
      } else {
        console.warn('Directory listing response not OK, using default fallback files.');
      }
    } catch (err) {
      console.error('Error fetching directory listing, using fallback:', err);
    }

    if (files.length === 0) {
      if (currentLanguage === 'de') {
        files = ['questions/QA questions German.md'];
      } else if (currentLanguage === 'es') {
        files = ['questions/QA questions Spanish.md'];
      } else {
        files = ['questions/QA questions.md'];
      }
      console.log('Fallback files list set for language', currentLanguage, ':', files);
    }

    for (const file of files) {
      try {
        console.log(`Fetching questions file: ${file}`);
        const fileResponse = await fetch(file);
        console.log(`File response status for ${file}:`, fileResponse.status);
        if (!fileResponse.ok) {
          throw new Error(`Failed to fetch ${file}: status ${fileResponse.status}`);
        }
        const text = await fileResponse.text();
        console.log(`Parsing markdown content of ${file}...`);

        // Parse table rows formatted as | # | Question | Model Answer |
        const regex = /\|\s*\d+\s*\|\s*(.*?)\s*\|\s*(.*?)\s*\|/g;
        let match;
        let fileCount = 0;
        while ((match = regex.exec(text)) !== null) {
          questions.push({ question: match[1].trim(), answer: match[2].trim() });
          fileCount++;
        }
        console.log(`Successfully parsed ${fileCount} questions from ${file}`);
      } catch (err) {
        console.error(`Error loading questions from ${file}:`, err);
      }
    }

    console.log('Total questions loaded:', questions.length);
    shuffleArray(questions);
    console.log('Shuffled questions count:', questions.length);

    questionsLoaded = true;
    if (testStarted) {
      showQuestion();
    }
  }

  function showQuestion() {
    const qEl = document.getElementById('question');
    const aEl = document.getElementById('answer');
    const revealBtn = document.getElementById('revealBtn');
    const nextBtn = document.getElementById('nextBtn');

    if (current >= questions.length) {
      console.log('No more questions. All reviewed.');
      qEl.textContent = uiTranslations[currentLanguage].completed;
      aEl.style.display = 'none';
      revealBtn.style.display = 'none';
      nextBtn.style.display = 'none';
      return;
    }

    console.log(`Showing question ${current + 1} of ${questions.length}:`, questions[current]);
    qEl.textContent = `${current + 1}. ${questions[current].question}`;
    aEl.textContent = questions[current].answer;
    aEl.style.display = 'none';
    revealBtn.style.display = 'inline-block';
    nextBtn.style.display = 'none';

    // Read the question aloud
    speakText(questions[current].question);
  }

  document.getElementById('revealBtn').addEventListener('click', () => {
    console.log('Reveal Answer clicked.');
    document.getElementById('answer').style.display = 'block';
    document.getElementById('revealBtn').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'inline-block';

    // Read the answer aloud
    speakText(questions[current].answer);
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    console.log('Next Question clicked.');
    current++;
    showQuestion();
  });

  // Keyboard navigation: Space or Enter triggers active action
  document.addEventListener('keydown', (event) => {
    if (!testStarted) return;
    if (document.activeElement && (
      document.activeElement.tagName === 'SELECT' ||
      document.activeElement.tagName === 'INPUT' ||
      document.activeElement.tagName === 'TEXTAREA' ||
      document.activeElement.isContentEditable
    )) {
      return;
    }

    if (event.key === ' ' || event.key === 'Enter') {
      event.preventDefault(); // Prevent space from scrolling the page
      const revealBtn = document.getElementById('revealBtn');
      const nextBtn = document.getElementById('nextBtn');
      if (revealBtn.style.display !== 'none') {
        revealBtn.click();
      } else if (nextBtn.style.display !== 'none') {
        nextBtn.click();
      }
    }
  });

  document.getElementById('langSelect').addEventListener('change', (e) => {
    currentLanguage = e.target.value;
    console.log(`Language changed to: ${currentLanguage}`);
    updateUIStrings();

    // Cancel speech synthesis
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
    }

    questions = [];
    current = 0;
    loadQuestions();
  });

  document.getElementById('startBtn').addEventListener('click', () => {
    console.log('Start button clicked. Starting test...');
    testStarted = true;
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
    if (questionsLoaded) {
      showQuestion();
    } else {
      const qEl = document.getElementById('question');
      qEl.textContent = uiTranslations[currentLanguage].loading;
    }
  });

  // Initial setup
  updateUIStrings();
  loadQuestions();
</script>
