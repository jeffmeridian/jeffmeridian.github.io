  <script>
    // Immediately apply theme to avoid flash
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
      document.body.classList.add('dark');
    }

    // --- LANGUAGE NOTIFICATION & REDIRECT ---
    (function() {
      // 1. Determine if this is a fresh visit or an internal navigation.
      const isInternalNavigation = document.referrer.indexOf(window.location.origin) === 0;

      // 2. Only auto-redirect on the English root on a fresh visit
      if (window.location.pathname === '/' && !isInternalNavigation) {
        let savedLang = localStorage.getItem('user_language');
        
        if (!savedLang) {
          const browserLang = (navigator.language || navigator.userLanguage).toLowerCase();
          if (browserLang.startsWith('de')) {
            window.location.replace('/deutsch/');
            return;
          } else if (browserLang.startsWith('es')) {
            window.location.replace('/espanol/');
            return;
          }
        } else {
           if (savedLang === 'de') {
             window.location.replace('/deutsch/');
             return;
           } else if (savedLang === 'es') {
             window.location.replace('/espanol/');
             return;
           }
        }
      }

      // 3. Update their preferred language based on where they actually navigate
      if (window.location.pathname.startsWith('/deutsch')) {
        localStorage.setItem('user_language', 'de');
      } else if (window.location.pathname.startsWith('/espanol')) {
        localStorage.setItem('user_language', 'es');
      } else if (window.location.pathname === '/') {
        localStorage.setItem('user_language', 'en');
      }
      
      // 4. Update the home icon link dynamically based on the current saved language
      document.addEventListener('DOMContentLoaded', () => {
        const homeLink = document.querySelector('a[title="Home"]');
        if (homeLink) {
           const currentLang = localStorage.getItem('user_language');
           if (currentLang === 'de') {
             homeLink.href = '/deutsch/';
           } else if (currentLang === 'es') {
             homeLink.href = '/espanol/';
           } else {
             homeLink.href = '/';
           }
        }
      });
    })();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const hamburgerBtn = document.getElementById('hamburger-btn');
      const hamburgerDropdown = document.getElementById('hamburger-dropdown');
      const languageBtn = document.getElementById('language-btn');
      const languageDropdown = document.getElementById('language-dropdown');
      
      if (hamburgerBtn && hamburgerDropdown) {
        hamburgerBtn.addEventListener('click', (e) => {
          hamburgerDropdown.classList.toggle('active');
          if (languageDropdown) languageDropdown.classList.remove('active');
          e.stopPropagation();
        });
      }

      if (languageBtn && languageDropdown) {
        languageBtn.addEventListener('click', (e) => {
          languageDropdown.classList.toggle('active');
          if (hamburgerDropdown) hamburgerDropdown.classList.remove('active');
          e.stopPropagation();
        });
      }

      document.addEventListener('click', (e) => {
        if (hamburgerDropdown && !hamburgerDropdown.contains(e.target)) {
          hamburgerDropdown.classList.remove('active');
        }
        if (languageDropdown && !languageDropdown.contains(e.target)) {
          languageDropdown.classList.remove('active');
        }
      });
    });
  </script>

<script src="./assets/js/phaser.js"></script>
<script>
  let globalMushroomsData = [];
  class Scene1 extends Phaser.Scene {
    constructor() {
      super("bootGame");
    }
    preload() {
      this.load.image("background", "assets/background.webp");
      this.load.image('logo', 'assets/logo.webp');
    }

    create() {
       // Show the mouse pointer
      document.body.style.cursor = 'default';
      console.log("v1.5");

      this.fetchHighScores().then((highScores) => {
        highScores.sort((a, b) => b.score - a.score);
        this.displayHighScores(highScores);
      });

      const { width, height } = this.sys.game.config;
      const centerX = width / 2;
      const centerY = height / 2;

      this.background = this.add.tileSprite(0, 0, width, height, "background")
        .setOrigin(0, 0)
        .setScrollFactor(0);

      this.scale.on('resize', (gameSize) => {
        this.background.setSize(gameSize.width, gameSize.height);
      });

      const logo = this.add.image(centerX, centerY - 130, 'logo').setOrigin(0.5);
      this.add.text(centerX - 200, centerY - 400, "CENTIPEDE", {
        fontFamily: "VT323",
        fontSize: "80px",
        color: "#00ff00",
      });

      const clickText = this.add.text(centerX + 10, centerY + 140, "Click to Start ", {
        fontFamily: "VT323",
        fontSize: "55px",
        color: "#00ff00",
      });

      clickText.setOrigin(0.5);

      this.tweens.add({
        targets: clickText,
        scaleX: 1.1,
        scaleY: 1.0,
        duration: 1000,
        ease: "Power2",
        yoyo: true,
        repeat: -1,
      });

      clickText.setInteractive({ useHandCursor: true });
      clickText.on(
        "pointerdown",
        function () {
          this.clearFormIframe();
          this.scene.start("playGame", {
            score: (this.score = 0),
            lives: (this.lives = 0),
            wave: (this.wave = 1),
            bonus: (this.bonus = 0),
            textScore: (this.textScore = 0),
            centipedeSegmentSpeed: this.centipedeSegmentSpeed || 250,
          });
        },
        this
      );
    }

    clearFormIframe() {
      console.log("form cleared")
      const formContainer = document.getElementById("formContainer");
      if (formContainer) {
        while (formContainer.firstChild) {
          formContainer.removeChild(formContainer.firstChild);
        }
      }
    }
    async fetchHighScores() {
      const url =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-AiKffxz0K2seWkfnGcEt0PekMB1NEbI7Iv3BhyAaZu_HmmepebguyWqAp_py0xXG16kEKSt1DqyB/pub?output=csv";

      try {
        const response = await fetch(url);
        const csvText = await response.text();
        return this.parseCSV(csvText);
      } catch (error) {
        console.error("Failed to fetch or parse the high scores:", error);
        return [];
      }
    }

    parseCSV(csvText) {
      const lines = csvText.trim().split("\n");
      return lines.map((line) => {
        const columns = line.split(",");
        return {
          name: columns[1].trim(),
          score: columns[2].trim(),
          wave: columns[3].trim(),
        };
      });
    }

    displayHighScores(highScores) {
      let yPos = 630;
      let processedScores = [];

      highScores.forEach((scoreObj) => {
        let { name, score, wave } = scoreObj;
        if (score !== "Score" && wave !== "Wave") {
          try {
            score = parseInt(atob(score), 10);
            wave = parseInt(atob(wave), 10);
          } catch (error) {
            score = 0;
            wave = 0;
          }
          processedScores.push({ name, score, wave });
        }
      });

      processedScores.sort((a, b) => b.score - a.score);

      processedScores.forEach((scoreObj, index) => {
        const displayText = `${index + 1}. ${scoreObj.name} - ${scoreObj.score}, Wave: ${scoreObj.wave}`;
        this.add.text(155, yPos, displayText, {
          fontFamily: "VT323",
          fontSize: "25px",
          color: "#00ffff",
        });
        yPos += 30;
      });
    }
  }

  class Scene2 extends Phaser.Scene {
    constructor() {
      super("playGame");
      this.player;
      this.centipede;
      this.bullets;
      this.mushrooms;
      this.canShoot = true;
      this.lastShotTime = 0;
      this.spider;
      this.fireRate = 100;
      this.shootSound;
      this.destroySound;
      this.gameOverSound;
      this.mushroomTouchedByPlayerSound;
      this.score = 0;
      this.lives = 4;
      this.wave = 1;
      this.isPaused = false;
      this.crabMushroomTouches = 0;
    }
    init(data) {
      this.score = data.score || 0;
      this.textScore = data.textScore || 0;
      this.lives = data.lives || 4;
      this.wave = data.wave || 1;
      this.centipedeSegmentSpeed = data.centipedeSegmentSpeed;
    }

    initHeartsDisplay() {
      const { width, height } = this.sys.game.config;
      const centerY = height / 2;
      const centerX = width / 2;
      this.hearts = [];
      const heartsSpacing = 50;
      const heartPositionY = centerY - 420;
      const heartStartX = centerX - 270;

      for (let i = 0; i < this.lives; i++) {
        const heart = this.add
          .image(heartStartX + i * heartsSpacing, heartPositionY, "heart")
          .setScale(0.5);
        this.hearts.push(heart);
      }
    }

    updateHeartsDisplay() {
      this.hearts.forEach((heart) => heart.destroy());
      this.hearts = [];
      this.initHeartsDisplay();
    }

    preload() {
      this.load.audio("backgroundMusic", "assets/backgroundMusic.mp3");
      this.load.image("background", "assets/background4.webp");
      this.load.image("startButton", "assets/startButton.webp");
      this.load.image("player", "assets/player.webp");
      this.load.image("centipede", "assets/centipede.webp");
      this.load.image("bullet", "assets/bullet.webp");
      this.load.image("mushroom", "assets/mushroom1.webp");
      this.load.image("heart", "assets/heart.webp");
      this.load.audio("shootSound", "assets/shoot.mp3");
      this.load.audio("destroySound", "assets/destroy.mp3");
      this.load.audio("gameOverSound", "assets/gameover.mp3");
      this.load.audio("spiderSound", "assets/spiderSound.mp3");
      this.load.audio("mushroomTouchedByPlayer", "assets/mushroomTouchedByPlayer.mp3");
      this.load.audio("crabEatsSound", "assets/crabEatsSound.mp3");
      this.load.aseprite({
        key: "crab",
        textureURL: "assets/crab.webp",
        atlasURL: "assets/crab.json",
      });
      this.load.aseprite({
        key: "spider",
        textureURL: "assets/spider1.webp",
        atlasURL: "assets/spider1.json",
      });
    }

    create() {
      document.body.style.cursor = 'none';
      this.startTime = this.time.now;
      const { width, height } = this.sys.game.config;
      const centerX = width / 2;
      const centerY = height / 2;

      this.background = this.add.tileSprite(0, 0, width, height, "background")
        .setOrigin(0, 0)
        .setScrollFactor(0);

      this.scale.on('resize', (gameSize) => {
        this.background.setSize(gameSize.width, gameSize.height);
      });

      this.initHeartsDisplay();

      this.backgroundMusic = this.sound.add("backgroundMusic", {
        volume: 0.2,
        loop: true,
      });

      this.input.keyboard.on("keydown-M", () => {
        if (this.backgroundMusic.isPlaying) {
          this.backgroundMusic.pause();
        } else {
          this.backgroundMusic.resume();
        }
      });

      this.player = this.physics.add
        .sprite(200, 300, "player")
        .setScale(0.5);
      this.shootSound = this.sound.add("shootSound");
      this.destroySound = this.sound.add("destroySound");
      this.gameOverSound = this.sound.add("gameOverSound");
      this.crabEatsSound = this.sound.add("crabEatsSound");
      this.mushroomTouchedByPlayerSound = this.sound.add("mushroomTouchedByPlayer");
      this.mushrooms = this.physics.add.staticGroup();

      this.createMushroom = function (x, y) {
        const mushroom = this.mushrooms
          .create(x, y, "mushroom")
          .setScale(0.1);
        mushroom.body.immovable = true;
        mushroom.setData("hits", 0);
        this.mushroomTouchedByPlayerSound.play();
      };

      this.textScore = this.add.text(centerX - 290, centerY - 400, "0", {
        fontFamily: "VT323",
        fontSize: "55px",
        color: "#00ff00",
      });

      this.textLives = this.add.text(-100, -100, `Lives: ${this.lives}`, {
        fontFamily: "VT323",
        fontSize: "24px",
        color: "#00ff00",
      });

      this.textWave = this.add.text(centerX - 390, centerY - 240, `Wave: ${this.wave}`, {
        fontFamily: "VT323",
        fontSize: "24px",
        color: "#00fff0",
      });

      this.anims.create({
        key: "walk",
        frames: this.anims.generateFrameNumbers("spider", {
          start: 0,
          end: 4,
        }),
        frameRate: 15,
        repeat: -1,
      });

      this.spider = this.physics.add
        .sprite(500, 700, "spider")
        .play("walk")
        .setOrigin(0.5, 0.5)
        .setScale(0.5)
        .setVelocityX(100);

      this.spider.y = 0;
      this.spiderSound = this.sound.add("spiderSound", { volume: 0.2 });
      this.spiderSound.play();

      this.time.addEvent({
        delay: 500,
        callback: () => {
          if (this.spider && this.spider.active) {
            this.createMushroom(this.spider.x, this.spider.y);
          }
        },
        loop: true,
      });

      this.centipede = this.physics.add.group();
      this.createCentipede();

      this.bullets = this.physics.add.group({
        defaultKey: "bullet",
        maxSize: 1,
        active: false,
        visible: false,
      });
      this.physics.world.setBoundsCollision(true, true, true, false);
      
      this.bullets.children.iterate((bullet) => {
        bullet.on("outofbounds", () => {
          bullet.destroy();
          this.canShoot = true;
        });
      });

      this.mushrooms = this.physics.add.group();

      this.physics.add.collider(this.centipede, this.bullets, this.bulletHitCentipede.bind(this));
      this.physics.add.collider(this.bullets, this.mushrooms, this.bulletHitMushroom.bind(this));
      this.physics.add.collider(this.bullets, this.spider, this.bulletHitSpider.bind(this));
      this.physics.add.overlap(this.centipede, this.mushrooms, this.centipedeHitMushroom.bind(this));
      this.physics.add.overlap(this.player, this.centipede, this.playerHitCentipede.bind(this));
      this.physics.add.collider(this.player, this.spider, this.playerHitSpider.bind(this));

      this.input.on("pointermove", (pointer) => {
        const minY = (this.game.config.height * 2) / 3;
        const newX = Phaser.Math.Clamp(pointer.x, 0, this.game.config.width);
        const newY = Phaser.Math.Clamp(pointer.y, minY, this.game.config.height);

        let overlappingMushroom = false;

        this.mushrooms.children.iterate((mushroom) => {
          const distance = Phaser.Math.Distance.Between(this.player.x, this.player.y, mushroom.x, mushroom.y);
          const mushroomOuterRadius = mushroom.width * 0.1 + 4;
          if (distance < mushroomOuterRadius) {
            overlappingMushroom = true;
            const angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, mushroom.x, mushroom.y);
            const stopX = this.player.x + (mushroomOuterRadius - 30) * Math.cos(angle);
            const stopY = this.player.y + (mushroomOuterRadius - 30) * Math.sin(angle);
            this.player.x = Phaser.Math.Clamp(stopX, 0, width);
            this.player.y = Phaser.Math.Clamp(stopY, minY, height);
          }
        });

        if (!overlappingMushroom) {
          this.player.x = newX;
          this.player.y = newY;
        }
      });

      this.input.on("pointerdown", (pointer) => {
        this.isPointerDown = true;
        if (this.canShoot) {
          const bullet = this.bullets.get(this.player.x, this.player.y);
          if (bullet) {
            bullet.setActive(true);
            bullet.setVisible(true);
            bullet.body.velocity.y = -300;
            this.shootSound.play();
            this.canShoot = true;
          }
        }
      });

      this.createRandomMushrooms(30);
      this.createCrab();
    }

    async restartGame() {
      this.gameOverSound.play();
      try {
        const highScoresFromBackEnd = await this.fetchHighScores();
        if (Array.isArray(highScoresFromBackEnd) && highScoresFromBackEnd.length > 0) {
          let highestScore = -Infinity;
          highScoresFromBackEnd.forEach((scoreObj, index) => {
            if (index === 0 || scoreObj.score === "Score") return;
            try {
              let decodedScore = parseInt(atob(scoreObj.score), 10);
              if (!isNaN(decodedScore) && decodedScore > highestScore) {
                highestScore = decodedScore;
              }
            } catch (e) {}
          });

          if (this.score > highestScore) {
            const currentScore = this.score;
            const currentWave = this.wave;
            this.showInputField().then(playerName => {
              this.submitToGoogleForm(currentScore, currentWave, playerName);
            }).catch(error => {});
          }
        }
      } catch (error) {}

      globalMushroomsData = [];
      this.lives = 4;
      this.wave = 1;
      this.score = 0;

      this.scene.start("bootGame", {
        score: 0,
        lives: 0,
        wave: 1,
        bonus: 0,
        textScore: 0,
      });
    }

    parseCSV(csvText) {
      const lines = csvText.trim().split("\n");
      return lines.map((line) => {
        const columns = line.split(",");
        return {
          name: columns[1].trim(),
          score: columns[2].trim(),
          wave: columns[3].trim(),
        };
      });
    }

    async fetchHighScores() {
      const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-AiKffxz0K2seWkfnGcEt0PekMB1NEbI7Iv3BhyAaZu_HmmepebguyWqAp_py0xXG16kEKSt1DqyB/pub?output=csv";
      try {
        const response = await fetch(url);
        const csvText = await response.text();
        return this.parseCSV(csvText);
      } catch (error) {
        return [];
      }
    }

    async submitToGoogleForm(score, wave, name) {
      const encodedScore = btoa(score.toString());
      const encodedWave = btoa(wave.toString());
      const formData = new FormData();
      formData.append("entry.1705590754", encodedWave);
      formData.append("entry.141223346", encodedScore);
      formData.append("entry.773241883", name.toString());
      const formActionURL = "https://docs.google.com/forms/d/e/1FAIpQLSdd392qpsZbFhc9rx-bGZTP2zn6J6CWLi_nd9wDd8ePOPa9Zw/formResponse";
      try {
        await fetch(formActionURL, { method: "POST", mode: "no-cors", body: formData });
      } catch (error) {}
    }

    showInputField() {
      return new Promise((resolve, reject) => {
        document.getElementById('inputContainer').style.display = 'block';
        document.getElementById('playerNameInput').focus();
        document.getElementById('submitBtn').onclick = () => {
          const playerName = document.getElementById('playerNameInput').value.trim();
          if (playerName) {
            document.getElementById('inputContainer').style.display = 'none';
            resolve(playerName);
          } else {
            alert("Please enter your name.");
            reject(new Error("No name entered"));
          }
        };
      });
    }

    fireBullet() {
      this.bullet = this.bullets.get(this.player.x, this.player.y);
      if (this.bullet) {
        this.bullet.setActive(true);
        this.bullet.setVisible(true);
        this.bullet.body.velocity.y = -500;
        this.shootSound.play();
      }
    }

    update() {
      if (this.lives === 0) { this.restartGame(); }
      if (this.spider) { this.moveSpider(); }
      const pointer = this.input.activePointer;
      if (pointer.isDown) { this.fireBullet(); }
      this.centipede.children.iterate((segment) => {
        if (segment.active) {
          segment.setVelocityX(this.centipedeSegmentSpeed * segment.getData("direction"));
          if (segment.y >= this.sys.game.config.height - 20) {
            segment.disableBody(true, true);
            this.score = 0;
            this.lives = 4;
            this.wave = 1;
            this.gameOverSound.play();
            this.scene.start("bootGame");
          }
        }
      });
      this.bullets.children.iterate((bullet) => {
        if (bullet.active && (bullet.y < 0 || bullet.y > this.sys.game.config.height)) {
          bullet.destroy();
          this.canShoot = true;
        }
      });
      this.checkCentipedeCollision();
      if (this.centipede.countActive() === 0) { this.nextLevel(); }
    }

    nextLevel() {
      const endTime = this.time.now;
      const durationInSeconds = (endTime - this.startTime) / 1000;
      let bonusScore = Math.max(0, Math.round((30 - durationInSeconds) * 900));
      this.scene.start("ScoreScene", {
        score: this.score,
        lives: this.lives,
        wave: this.wave,
        bonusScore: bonusScore,
        centipedeSegmentSpeed: this.centipedeSegmentSpeed,
      });
    }

    createCentipede() {
      for (let i = 0; i < 8; i++) {
        const segment = this.centipede.create(32 + i * 40, 0, "centipede").setActive(true);
        segment.setData("direction", 1);
        segment.setData("hasMovedDown", false);
        segment.setVelocityX(this.centipedeSegmentSpeed * segment.getData("direction"));
      }
    }

    bulletHitCentipede(centipedeSegment, bullet) {
      const pointsText = this.add.text(centipedeSegment.x + 10, centipedeSegment.y + 10, "80", {
        fontFamily: "VT323", fontSize: "20px", color: "#ffff00"
      }).setOrigin(0.5, 0.5);
      this.time.delayedCall(400, () => { pointsText.destroy(); });
      centipedeSegment.disableBody(true, true);
      bullet.destroy();
      this.destroySound.play();
      this.createMushroom(centipedeSegment.x, centipedeSegment.y);
      globalMushroomsData.push({ x: centipedeSegment.x, y: centipedeSegment.y, hits: 0 });
      this.score += 80;
      this.textScore.setText("" + this.score);
      this.canShoot = true;
    }

    bulletHitMushroom(bullet, mushroom) {
      let hits = mushroom.getData("hits") + 1;
      mushroom.setData("hits", hits);
      if (hits === 1) { mushroom.setTint(0xff9999); }
      else if (hits === 2) { mushroom.setTint(0xff6666); }
      if (hits >= 3) {
        const index = globalMushroomsData.findIndex(mData => mData.x === mushroom.x && mData.y === mushroom.y);
        if (index > -1) { globalMushroomsData.splice(index, 1); }
        const pointsText = this.add.text(mushroom.x, mushroom.y, "5", {
          fontFamily: "VT323", fontSize: "20px", color: "#ffff00"
        }).setOrigin(0.5, 0.5);
        this.time.delayedCall(400, () => { pointsText.destroy(); });
        mushroom.destroy();
        this.destroySound.play();
        this.score += 5;
        this.textScore.setText("" + this.score);
      }
      bullet.destroy();
      this.canShoot = true;
    }

    bulletHitSpider(bullet, spider) {
      const pointsText = this.add.text(spider.x, spider.y, "200", {
        fontFamily: "VT323", fontSize: "20px", color: "#ffff00"
      }).setOrigin(0.5, 0.5);
      this.time.delayedCall(400, () => { pointsText.destroy(); });
      bullet.destroy();
      spider.destroy();
      this.score += 200;
      this.textScore.setText("" + this.score);
    }

    createRandomMushrooms(count) {
      if (this.wave > 1 && globalMushroomsData.length > 0) {
        globalMushroomsData.forEach(mData => { this.createMushroom(mData.x, mData.y); });
      }
      const mushroomWidth = 30;
      const spacing = mushroomWidth;
      let currentIndex = 0;
      let delayBetween = 100;
      const createNextMushroom = () => {
        if (currentIndex < count) {
          const x = Phaser.Math.Between(spacing, this.sys.game.config.width - spacing);
          const y = Phaser.Math.Between(spacing, this.sys.game.config.height - spacing);
          this.createMushroom(x, y);
          currentIndex++;
          setTimeout(createNextMushroom, delayBetween);
        }
      };
      createNextMushroom();
    }

    centipedeHitMushroom(centipedeSegment, mushroom) {
      if (centipedeSegment.x < this.sys.game.config.width - 20 && centipedeSegment.x > 20) {
        centipedeSegment.setData("direction", -centipedeSegment.getData("direction"));
      } else {
        centipedeSegment.y += 15;
        centipedeSegment.setData("direction", -centipedeSegment.getData("direction"));
      }
      centipedeSegment.y += 5;
      centipedeSegment.setData("direction", -centipedeSegment.getData("direction"));
    }

    playerHitCentipede(player, centipedeSegment) { this.restartGame(); }

    checkCentipedeCollision() {
      this.centipede.children.iterate((segment) => {
        if (segment.active) {
          if ((segment.x >= this.sys.game.config.width - 20 || segment.x <= 20) && !segment.getData("hasMovedDown")) {
            segment.y += 15;
            segment.setData("direction", -segment.getData("direction"));
            segment.setData("hasMovedDown", true);
          } else if (segment.x < this.sys.game.config.width - 20 && segment.x > 20) {
            segment.setData("hasMovedDown", false);
          }
        }
      });
    }

    playerHitSpider(player, spider) {
      this.score -= 100;
      this.lives -= 1;
      this.mushroomTouchedByPlayerSound.play();
      spider.y = 0;
      spider.x = Phaser.Math.Between(50, 550);
      this.destroySound.play();
      this.updateHeartsDisplay();
    }

    createCrab() {
      this.anims.create({
        key: "crabWalk",
        frames: this.anims.generateFrameNumbers("crab", { start: 0, end: 3 }),
        frameRate: 15,
        repeat: -1,
      });

      this.crab = this.physics.add
        .sprite(-100, (this.sys.game.config.height * 2) / 3, "crab")
        .play("crabWalk")
        .setOrigin(0.5, 0.5)
        .setScale(0.25);

      const minDelay = 4000;
      this.physics.add.collider(this.bullets, this.crab, this.bulletHitCrab, null, this);
      this.physics.add.collider(this.crab, this.mushrooms, this.crabHitsMushroom, null, this);
      this.physics.add.collider(this.crab, this.player, () => {
        this.lives -= 1;
        this.player.setVelocity(0, 0);
        this.updateHeartsDisplay();
        this.destroySound.play();
      });

      this.time.delayedCall(minDelay + Phaser.Math.Between(0, 2000), () => {
        if (!this.crab || !this.crab.body) return;
        let speed = 200;
        let direction = 1;
        this.crab.body.velocity.x = speed;
        this.crab.body.velocity.y = speed * direction;
        this.time.addEvent({
          delay: 1100,
          callback: () => {
            if (!this.crab || !this.crab.body) return;
            if (this.crab.x > this.sys.game.config.width + 40) {
              this.crab.setPosition(-100, (this.sys.game.config.height * 2) / 3);
              this.crab.body.velocity.x = speed;
            } else {
              this.crab.body.velocity.y = speed * direction;
              direction *= -1;
            }
          },
          loop: true,
        });
      });
    }

    crabHitsMushroom(crab, mushroom) {
      this.crabMushroomTouches++;
      if (this.crabMushroomTouches % 2 === 0) {
        this.sound.play("crabEatsSound");
        const index = globalMushroomsData.findIndex(mData => mData.x === mushroom.x && mData.y === mushroom.y);
        if (index > -1) { globalMushroomsData.splice(index, 1); }
        mushroom.destroy();
      }
    }

    moveSpider() {
      if (this.spider && this.spider.active) {
        this.spider.setVelocityX(0);
        this.spider.y += 2.5;
        if (this.spider.y > 900) {
          this.spider.y = 0;
          this.spiderSound = this.sound.add("spiderSound", { volume: 0.2 });
          this.spiderSound.play();
          this.spider.x = Phaser.Math.Between(10, 590);
        }
      }
    }

    bulletHitCrab(bullet, crab) {
      const pointsText = this.add.text(crab.x, crab.y, "300", {
        fontFamily: "VT323", fontSize: "20px", color: "#ffff00"
      }).setOrigin(0.5, 0.5);
      this.time.delayedCall(400, () => { pointsText.destroy(); });
      bullet.destroy();
      crab.destroy();
      this.score += 300;
      this.textScore.setText(`${this.score}`);
      this.sound.play("destroySound");
      this.time.addEvent({ delay: 4000, callback: () => { this.createCrab(); } });
    }
  }

  class ScoreScene extends Phaser.Scene {
    constructor() { super("ScoreScene"); }
    init(data) {
      this.score = data.score;
      this.lives = data.lives;
      this.wave = data.wave;
      this.bonusScore = data.bonusScore || 0;
      this.centipedeSegmentSpeed = data.centipedeSegmentSpeed;
    }
    preload() {
      this.load.audio("tickSound", "assets/tick.mp3");
      this.load.audio("totalSound", "assets/total.mp3");
      this.load.image("heart", "assets/heart.webp");
    }
    create() {
      document.body.style.cursor = 'default';
      const { width, height } = this.sys.game.config;
      const centerX = width / 2;
      const centerY = height / 2;
      this.add.tileSprite(0, 0, width, height, "background").setOrigin(0);

      const heartsSpacing = 40;
      const heartPositionY = centerY - 420;
      for (let i = 0; i < this.lives; i++) {
        this.add.image(centerX - 270 + i * heartsSpacing, heartPositionY, "heart").setScale(0.5);
      }

      let displayBonusScore = 0;
      let displayScore = 0;
      let displayTotal = this.bonusScore + this.score;

      this.add.text(centerX, centerY - 250, `Wave ${this.wave}`, {
        fontFamily: "VT323", fontSize: "100px", color: "#ffffff"
      }).setOrigin(0.5);

      const scoreBonusText = this.add.text(centerX, centerY - 130, `Bonus: 0`, {
        fontFamily: "VT323", fontSize: "100px", color: "#ffffff"
      }).setOrigin(0.5);

      const scoreText = this.add.text(centerX, centerY - 50, `Score: 0`, {
        fontFamily: "VT323", fontSize: "100px", color: "#ffffff"
      }).setOrigin(0.5);

      const tickSound = this.sound.add("tickSound");
      const totalSound = this.sound.add("totalSound");

      const updateScoreDisplay = () => {
        displayScore += 50;
        if (displayScore >= displayTotal) {
          displayScore = displayTotal;
          scoreText.setText(`Score: ${displayScore}`);
          tickSound.play();
          totalSound.play();
          const continueButton = this.add.text(centerX, centerY + 150, "Continue", {
            fontFamily: "VT323", fontSize: "50px", color: "#00ff00"
          }).setOrigin(0.5).setInteractive({ useHandCursor: true });

          if (this.centipedeSegmentSpeed <= 360) { this.centipedeSegmentSpeed *= 1.01; }
          continueButton.on("pointerdown", () => {
            this.scene.start("playGame", {
              score: displayTotal,
              lives: this.lives,
              wave: this.wave + 1,
              centipedeSegmentSpeed: this.centipedeSegmentSpeed,
            });
          });
        } else {
          scoreText.setText(`Score: ${displayScore}`);
          tickSound.play();
          this.time.delayedCall(80, updateScoreDisplay);
        }
      };

      const updateScoreBonusDisplay = () => {
        displayBonusScore += 50;
        if (displayBonusScore >= this.bonusScore) {
          displayBonusScore = this.bonusScore;
          scoreBonusText.setText(`Bonus: ${displayBonusScore}`);
          tickSound.play();
          updateScoreDisplay();
        } else {
          scoreBonusText.setText(`Bonus: ${displayBonusScore}`);
          tickSound.play();
          this.time.delayedCall(80, updateScoreBonusDisplay);
        }
      };
      updateScoreBonusDisplay();
    }
  }

  const gameConfig = {
    type: Phaser.AUTO,
    width: 600,
    height: 900,
    parent: "gameContainer",
    physics: {
      default: "arcade",
      arcade: { gravity: { y: 0 }, debug: false },
    },
    scene: [Scene1, Scene2, ScoreScene],
    scale: {
      mode: Phaser.Scale.FIT,
      autoCenter: Phaser.Scale.CENTER_BOTH,
      width: 600,
      height: 900,
    }
  };
  let game = new Phaser.Game(gameConfig);
</script>
